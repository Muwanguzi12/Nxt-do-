# Wrangler configuration for NXT DO Hook Up Worker APIs
name = "nxt-do-hook-up-api"
main = "cloudflare-worker.ts"
compatibility_date = "2024-03-01"

[vars]
PESAPAL_ENVIRONMENT = "sandbox" # Change to "production" for live payments
PESAPAL_IPN_URL = "https://your-domain.com/api/pesapal/callback"

# Secure API Keys (Set these on the Cloudflare dashboard or with 'wrangler secret put')
# - GEMINI_API_KEY
# - PESAPAL_CONSUMER_KEY
# - PESAPAL_CONSUMER_SECRET
# - PESAPAL_IPN_ID
